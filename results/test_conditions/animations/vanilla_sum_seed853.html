1205, 0.7112217275922293, 0.7116352283332008, 0.71156496060029, 0.7107604386547556, 0.7115752920748791, 0.7116350966281068, 0.711634707790316, 0.7116341189515187, 0.7116174941936674, 0.7108825837337913]], "overlay": {"gini": 0.6821323760469654, "unemployment": 0.8174807197943444, "agency_floor": 0.014530339672969165, "horizon_index": 0.5, "mean_firm_floor": 0.9694551299488834, "n_workers": 389, "n_firms": 20, "n_cartels": 0, "trust_planner": 0.5, "trust_institutional": 0.5, "mean_firm_hi": 1.0, "gov_type": "authoritarian", "election_winner": "none", "sevc_adoption_rate": 0.0, "total_pollution": 546.9370027288717, "mean_aggression": 0.2550722769243, "crime_events": 1, "riot_events": 0, "mean_conflict": 0.005384284337974714, "legitimacy_mean": 0.7114085611233136, "identity_conflict_index": 0.1914995966967277}}];
const GRID = 80;
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CELL = W / GRID;

let frameIdx = 0;
let playing = true;
let speed = 10; // frames per second
let animId = null;
let lastTime = 0;

// Color helpers
function wealthColor(w) {
    const t = Math.min(w / 400, 1);
    const r = Math.round(30 + 50 * (1 - t));
    const g = Math.round(100 + 155 * t);
    const b = Math.round(80 + 120 * t);
    return `rgb(${r},${g},${b})`;
}

function drawFrame(idx) {
    if (idx < 0 || idx >= FRAMES.length) return;
    const frame = FRAMES[idx];
    ctx.clearRect(0, 0, W, H);

    // Pollution overlay
    if (frame.pollution_grid) {
        const pg = frame.pollution_grid;
        const rows = pg.length, cols = pg[0].length;
        const cw = W / cols, ch = H / rows;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const v = pg[r][c];
                if (v > 0.1) {
                    const a = Math.min(v / 20, 0.5);
                    ctx.fillStyle = `rgba(255,50,50,${a})`;
                    ctx.fillRect(r * cw, (cols - 1 - c) * ch, cw, ch);
                }
            }
        }
    }

    // Food overlay (very subtle green)
    if (frame.food_grid) {
        const fg = frame.food_grid;
        const rows = fg.length, cols = fg[0].length;
        const cw = W / cols, ch = H / rows;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const v = fg[r][c];
                if (v > 5) {
                    const a = Math.min(v / 100, 0.15);
                    ctx.fillStyle = `rgba(46,204,113,${a})`;
                    ctx.fillRect(r * cw, (cols - 1 - c) * ch, cw, ch);
                }
            }
        }
    }

    // Conflict overlay (orange, before agents)
    if (frame.conflict_grid) {
        const cg = frame.conflict_grid;
        const rows = cg.length, cols = cg[0].length;
        const cw = W / cols, ch = H / rows;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const v = cg[r][c];
                if (v > 0.05) {
                    const a = Math.min(v, 0.5);
                    ctx.fillStyle = `rgba(255,140,0,${a})`;
                    ctx.fillRect(r * cw, (cols - 1 - c) * ch, cw, ch);
                }
            }
        }
    }

    // Workers
    const workers = frame.workers || [];
    for (const w of workers) {
        const x = w.x * CELL + CELL / 2;
        const y = (GRID - 1 - w.y) * CELL + CELL / 2;
        const radius = Math.max(1.5, Math.min(4, w.wealth / 80));

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);

        const agg = w.aggression || 0;
        if (agg > 0.7) {
            ctx.fillStyle = '#ff6347';  // aggressive = tomato red
        } else if (w.in_debt) {
            ctx.fillStyle = '#f1c40f';
        } else if (w.employed) {
            ctx.fillStyle = wealthColor(w.wealth);
        } else {
            ctx.fillStyle = '#e74c3c';
        }
        ctx.fill();
        // Aggressive border ring
        if (agg > 0.5) {
            ctx.strokeStyle = '#ff4500';
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }
    }

    // Firms
    const firms = frame.firms || [];
    for (const f of firms) {
        const x = f.x * CELL;
        const y = (GRID - 1 - f.y) * CELL;
        const size = Math.max(4, Math.min(14, 4 + f.n_workers * 1.5));

        if (f.in_cartel) {
            ctx.fillStyle = '#e94560';
        } else if (f.is_sevc === false) {
            ctx.fillStyle = '#9b59b6';  // vanilla = purple
        } else {
            ctx.fillStyle = '#3498db';  // SEVC = blue
        }
        ctx.fillRect(x, y, size, size);

        // Border: orange-red for declining HI, black otherwise
        const hi = f.firm_hi != null ? f.firm_hi : 1.0;
        if (hi < 0.7) {
            ctx.strokeStyle = '#e67e22';
            ctx.lineWidth = 1.5;
        } else {
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 0.5;
        }
        ctx.strokeRect(x, y, size, size);
    }

    // Update dashboard
    const overlay = frame.overlay || {};
    const metricsDiv = document.getElementById('metrics');

    function cls(val, good, bad) {
        if (val <= good) return 'good';
        if (val >= bad) return 'bad';
        return 'warn';
    }
    function clsHi(val, good, bad) {
        if (val >= good) return 'good';
        if (val <= bad) return 'bad';
        return 'warn';
    }

    const govLabel = overlay.gov_type || '---';
    const elecLabel = overlay.election_winner || 'none';

    metricsDiv.innerHTML = [
        row('Workers', overlay.n_workers || '?'),
        row('Firms', overlay.n_firms || '?'),
        row('Cartels', overlay.n_cartels || 0, overlay.n_cartels > 0 ? 'bad' : 'good'),
        '<div style="height:8px"></div>',
        row('Gini', fmt(overlay.gini, 3), cls(overlay.gini, 0.35, 0.6)),
        row('Unemployment', pct(overlay.unemployment), cls(overlay.unemployment, 0.10, 0.25)),
        row('Agency Floor', fmt(overlay.agency_floor, 2), clsHi(overlay.agency_floor, 2, 0.5)),
        row('Horizon Index', fmt(overlay.horizon_index, 3), clsHi(overlay.horizon_index, 0.6, 0.3)),
        row('Firm Floor', fmt(overlay.mean_firm_floor, 3), clsHi(overlay.mean_firm_floor, 0.3, 0.1)),
        row('Firm HI', fmt(overlay.mean_firm_hi, 3), clsHi(overlay.mean_firm_hi, 0.8, 0.5)),
        '<div style="height:8px"></div>',
        row('Gov Type', govLabel),
        row('Election', elecLabel),
        row('SEVC Adopt', pct(overlay.sevc_adoption_rate)),
        row('Pollution', fmt(overlay.total_pollution, 0)),
        '<div style="height:8px"></div>',
        row('Aggression', fmt(overlay.mean_aggression, 3), cls(overlay.mean_aggression, 0.2, 0.5)),
        row('Conflict', fmt(overlay.mean_conflict, 3), cls(overlay.mean_conflict, 0.1, 0.4)),
        row('Legitimacy', fmt(overlay.legitimacy_mean, 3), clsHi(overlay.legitimacy_mean, 0.6, 0.3)),
        row('Crime', overlay.crime_events || 0, (overlay.crime_events || 0) > 5 ? 'bad' : 'good'),
        row('Riots', overlay.riot_events || 0, (overlay.riot_events || 0) > 0 ? 'bad' : 'good'),
        '<div style="height:8px"></div>',
        row('Planner Trust', fmt(overlay.trust_planner, 3), clsHi(overlay.trust_planner, 0.5, 0.25)),
        row('System Trust', fmt(overlay.trust_institutional, 3), clsHi(overlay.trust_institutional, 0.4, 0.2)),
    ].join('');

    // Step label
    document.getElementById('stepLabel').textContent =
        `Step ${frame.step || idx} / ${FRAMES.length}`;
    document.getElementById('scrubber').value = idx;
}

function row(label, value, cls) {
    const c = cls ? ` ${cls}` : '';
    return `<div class="metric-row"><span class="metric-label">${label}</span><span class="metric-value${c}">${value}</span></div>`;
}
function fmt(v, d) { return v != null ? Number(v).toFixed(d) : '---'; }
function pct(v) { return v != null ? (Number(v) * 100).toFixed(1) + '%' : '---'; }

// Playback
function tick(timestamp) {
    if (!playing) return;
    const interval = 1000 / speed;
    if (timestamp - lastTime >= interval) {
        lastTime = timestamp;
        if (frameIdx < FRAMES.length - 1) {
            frameIdx++;
            drawFrame(frameIdx);
        } else {
            playing = false;
            document.getElementById('btnPlay').classList.remove('active');
            document.getElementById('btnPlay').innerHTML = '&#9654; Play';
        }
    }
    animId = requestAnimationFrame(tick);
}

document.getElementById('btnPlay').onclick = () => {
    playing = !playing;
    const btn = document.getElementById('btnPlay');
    if (playing) {
        if (frameIdx >= FRAMES.length - 1) frameIdx = 0;
        btn.classList.add('active');
        btn.innerHTML = '&#10074;&#10074; Pause';
        lastTime = 0;
        animId = requestAnimationFrame(tick);
    } else {
        btn.classList.remove('active');
        btn.innerHTML = '&#9654; Play';
        if (animId) cancelAnimationFrame(animId);
    }
};

document.getElementById('btnPrev').onclick = () => {
    if (frameIdx > 0) { frameIdx--; drawFrame(frameIdx); }
};
document.getElementById('btnNext').onclick = () => {
    if (frameIdx < FRAMES.length - 1) { frameIdx++; drawFrame(frameIdx); }
};

document.getElementById('scrubber').oninput = (e) => {
    frameIdx = parseInt(e.target.value);
    drawFrame(frameIdx);
};

document.getElementById('speedSlider').oninput = (e) => {
    speed = parseInt(e.target.value);
    document.getElementById('speedLabel').textContent = speed + ' fps';
};

// Keyboard controls
document.addEventListener('keydown', (e) => {
    if (e.key === ' ') { e.preventDefault(); document.getElementById('btnPlay').click(); }
    if (e.key === 'ArrowLeft') { document.getElementById('btnPrev').click(); }
    if (e.key === 'ArrowRight') { document.getElementById('btnNext').click(); }
});

// Init
document.getElementById('scrubber').max = FRAMES.length - 1;
drawFrame(0);
if (playing) { animId = requestAnimationFrame(tick); }
document.getElementById('btnPlay').innerHTML = '&#10074;&#10074; Pause';
</script>
